<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admissions | Navjeevan Junior College</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img src="images/Logo.jpg" alt="Navjeevan Junior College logo" />
        <span class="logo-text">Navjeevan Junior College</span>
      </a>
      <button id="menuToggle" class="menu-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="mainNav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="courses.html">Courses</a>
        <a href="admissions.html">Admissions</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="page-header">
      <h1>Admissions</h1>
      <p>Start your learning journey with Navjeevan Junior College. Submit your details and we will contact you.</p>
    </section>

    <section class="admissions-form">
      <form id="admissionsForm">
        <label>
          Full Name
          <input type="text" name="name" placeholder="Your name" required />
        </label>
        <label>
          Email Address
          <input type="email" name="email" placeholder="you@example.com" required />
        </label>
        <label>
          Course Interest
          <select name="course" required>
            <option value="">Select a program</option>
            <option value="web">Web Development</option>
            <option value="data">Data Science</option>
            <option value="design">Creative Design</option>
            <option value="career">Career Coaching</option>
          </select>
        </label>
        <label>
          Message
          <textarea name="message" rows="4" placeholder="Tell us more" />
        </label>
        <button type="submit" class="btn btn-primary">Submit Application</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Navjeevan Junior College. All rights reserved.</p>
      <div class="footer-links">
        <a href="courses.html">Courses</a>
        <a href="contact.html">Contact</a>
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="terms-and-conditions.html">Terms & Conditions</a>
        <a href="refund-policy.html">Refund Policy</a>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
